name: Website Decoder

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL to analyze (e.g. https://wisprflow.ai)'
        required: true
        type: string

jobs:
  analyze:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser and system dependencies
        run: playwright install --with-deps chromium

      - name: Run analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python analyze.py "${{ github.event.inputs.url }}"

      - name: Extract domain and run_id
        id: meta
        run: |
          DOMAIN=$(python -c "from urllib.parse import urlparse; print(urlparse('${{ github.event.inputs.url }}').netloc.replace('www.',''))")
          RUN_ID=$(ls output/screenshots/$DOMAIN/ | sort | tail -1)
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Detected: domain=$DOMAIN  run_id=$RUN_ID"

      - name: Commit results
        run: |
          git config user.name "Website Decoder Bot"
          git config user.email "decoder-bot@noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "analysis: ${{ github.event.inputs.url }} — $(date +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Trigger pptx-builder
        if: ${{ secrets.PPTX_BUILDER_TOKEN != '' }}
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PPTX_BUILDER_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Rahul-peacenik159/pptx-builder/dispatches \
            -d "{\"event_type\":\"build-pptx\",\"client_payload\":{\"domain\":\"${{ steps.meta.outputs.domain }}\",\"run_id\":\"${{ steps.meta.outputs.run_id }}\",\"repo1\":\"${{ github.repository }}\"}}"
