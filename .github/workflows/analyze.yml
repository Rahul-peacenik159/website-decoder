name: Website Decoder

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL to analyze (e.g. https://wisprflow.ai)'
        required: true
        type: string

jobs:
  analyze:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser and system dependencies
        run: playwright install --with-deps chromium

      - name: Run analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python analyze.py "${{ github.event.inputs.url }}"

      - name: Commit results
        run: |
          git config user.name "Website Decoder Bot"
          git config user.email "decoder-bot@noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "analysis: ${{ github.event.inputs.url }} — $(date +'%Y-%m-%d %H:%M UTC')"
          git push
