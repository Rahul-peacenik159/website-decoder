name: Website Decoder

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL to analyze (e.g. https://wisprflow.ai)'
        required: true
        type: string

jobs:
  analyze:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install system dependencies for Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0t64 libatk-bridge2.0-0t64 \
            libcups2t64 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3t64 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 libasound2t64 \
            libx11-xcb1 libxcb-dri3-0 libxshmfence1

      - name: Install Playwright browser
        run: playwright install chromium

      - name: Run analysis
        run: python analyze.py "${{ github.event.inputs.url }}"

      - name: Commit results
        run: |
          git config user.name "Website Decoder Bot"
          git config user.email "decoder-bot@noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "analysis: ${{ github.event.inputs.url }} — $(date +'%Y-%m-%d %H:%M UTC')"
          git push
